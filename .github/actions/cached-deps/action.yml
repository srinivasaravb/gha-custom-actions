name: 'Get The Cache & Dependencies'
description: 'A reusable workflow for cache and dependencies compiste actions.'
inputs:
    caching:
      description: 'Whether to cache dependencies or not'
      required: false
      default: 'true'
outputs:
    used-cache:
      description: 'Wheather the cache was use or not'
      required: false
      default: 'false'
      value: ${{ steps.install.outputs.cache-hit }}
runs:
  using: 'composite'
  steps:
    - name: Cache dependencies
      if: inputs.caching == 'true'
      id: cache
      uses: actions/cache@v4
      with:
        path: node_modules
        key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}
    - name: Install dependencies
      id: install
      if: steps.cache.outputs.cache-hit != 'true' | | inputs.caching == 'false'
      run: |
        npm ci
        echo "cache='${{ inputs.caching }}'" >> $GITHUB_OUTPUT
      shell: bash